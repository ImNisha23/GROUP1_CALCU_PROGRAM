<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="calculator">
        <input type="text" id="display" readonly placeholder="0">
        <div id="keys">

            <button type="button" onclick="clearDisplay()" class="clear-btn">CLR</button>
            <button type="button" onclick="eraseLast()" class="delete-btn">⌫</button>
            <button type="button" onclick="calculate()" class="equal-btn">=</button>
            <button type="button" onclick="appendToDisplay('+')" class="operator-btn">+</button>

            <button type="button" onclick="appendToDisplay('7')">7</button>
            <button type="button" onclick="appendToDisplay('8')">8</button>
            <button type="button" onclick="appendToDisplay('9')">9</button>
            <button type="button" onclick="appendToDisplay('-')" class="operator-btn">−</button>

            <button type="button" onclick="appendToDisplay('4')">4</button>
            <button type="button" onclick="appendToDisplay('5')">5</button>
            <button type="button" onclick="appendToDisplay('6')">6</button>
            <button type="button" onclick="appendToDisplay('*')" class="operator-btn">×</button>

            <button type="button" onclick="appendToDisplay('1')">1</button>
            <button type="button" onclick="appendToDisplay('2')">2</button>
            <button type="button" onclick="appendToDisplay('3')">3</button>
            <button type="button" onclick="appendToDisplay('/')" class="operator-btn">÷</button>

            <button type="button" onclick="appendToDisplay('0')">0</button>
            <button type="button" onclick="appendDecimal()">.</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
